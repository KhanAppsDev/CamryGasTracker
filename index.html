<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Ledger & Insights</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: system-ui, sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .year-card { cursor: pointer; border: 2px solid transparent; transition: 0.2s; text-align: center; padding: 15px; background: #eff6ff; border-radius: 8px; }
        .year-card:hover { border-color: var(--primary); }
        .hidden { display: none; }
        button { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        input, select { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        .stats-hero { font-size: 0.9rem; color: #64748b; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚗 Vehicle Ledger</h2>

    <div class="card">
        <h3>Add Entry</h3>
        <form id="dataForm" class="grid">
            <input type="date" id="date" required>
            <input type="number" id="odometer" placeholder="Odometer" required>
            <input type="number" step="0.01" id="cost" placeholder="Cost ($)" required>
            <input type="number" step="0.01" id="gallons" placeholder="Gallons (0 for Oil Change)">
            <select id="type">
                <option value="gas">Gas Fill-up</option>
                <option value="oil">Oil Change</option>
            </select>
            <button type="submit">Save Entry</button>
        </form>
    </div>

    <div class="card">
        <div style="display: flex; gap: 10px;">
            <button onclick="showYearly()">Years at a Glance</button>
            <button onclick="showMaintenance()">Oil Change History</button>
        </div>
        
        <div id="view-yearly">
            <h3>Select a Year</h3>
            <div id="year-grid" class="grid"></div>
        </div>

        <div id="view-monthly" class="hidden">
            <button onclick="showYearly()" style="background:#64748b">← Back to Years</button>
            <h3 id="selected-year-title"></h3>
            <table id="month-table">
                <thead>
                    <tr><th>Month</th><th>Spent</th><th>Miles Driven</th><th>Avg Days Between Gas</th></tr>
                </thead>
                <tbody id="month-body"></tbody>
            </table>
        </div>

        <div id="view-maintenance" class="hidden">
            <h3>Maintenance Logs</h3>
            <table id="oil-table">
                <thead>
                    <tr><th>Date</th><th>Odometer</th><th>Cost</th></tr>
                </thead>
                <tbody id="oil-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 1. YOUR HISTORICAL DATA (Bake your data here)
    const historicalData = [
        { date: "2023-12-01", odometer: 10000, cost: 45.00, gallons: 12.0, type: "gas" },
        { date: "2023-12-15", odometer: 10350, cost: 42.00, gallons: 11.5, type: "gas" },
        { date: "2024-01-05", odometer: 10700, cost: 50.00, gallons: 13.0, type: "gas" },
        { date: "2024-01-20", odometer: 11050, cost: 85.00, gallons: 0, type: "oil" }
    ];

    // 2. DATA MANAGEMENT logic
    function getFullData() {
        const localData = JSON.parse(localStorage.getItem('vehicle_logs')) || [];
        return [...historicalData, ...localData].sort((a, b) => new Date(a.date) - new Date(b.date));
    }

    document.getElementById('dataForm').onsubmit = (e) => {
        e.preventDefault();
        const newEntry = {
            date: document.getElementById('date').value,
            odometer: parseFloat(document.getElementById('odometer').value),
            cost: parseFloat(document.getElementById('cost').value),
            gallons: parseFloat(document.getElementById('gallons').value) || 0,
            type: document.getElementById('type').value
        };
        const localData = JSON.parse(localStorage.getItem('vehicle_logs')) || [];
        localData.push(newEntry);
        localStorage.setItem('vehicle_logs', JSON.stringify(localData));
        location.reload();
    };

    // 3. CALCULATIONS
    function calculateDaysBetween(entries) {
        if (entries.length < 2) return "N/A";
        let totalDays = 0;
        for (let i = 1; i < entries.length; i++) {
            const diff = new Date(entries[i].date) - new Date(entries[i-1].date);
            totalDays += diff / (1000 * 60 * 60 * 24);
        }
        return (totalDays / (entries.length - 1)).toFixed(1) + " days";
    }

    // 4. RENDERING VIEWS
    function showYearly() {
        switchView('view-yearly');
        const data = getFullData();
        const years = [...new Set(data.map(d => d.date.split('-')[0]))];
        const grid = document.getElementById('year-grid');
        grid.innerHTML = '';

        years.forEach(year => {
            const yearData = data.filter(d => d.date.startsWith(year));
            const totalSpend = yearData.reduce((sum, d) => sum + d.cost, 0);
            const div = document.createElement('div');
            div.className = 'year-card';
            div.innerHTML = `<strong>${year}</strong><div class="stats-hero">$${totalSpend.toFixed(2)} total</div>`;
            div.onclick = () => showMonths(year);
            grid.appendChild(div);
        });
    }

    function showMonths(year) {
        switchView('view-monthly');
        document.getElementById('selected-year-title').innerText = year + " Breakdown";
        const data = getFullData().filter(d => d.date.startsWith(year));
        const tbody = document.getElementById('month-body');
        tbody.innerHTML = '';

        for (let m = 0; m < 12; m++) {
            const monthStr = `${year}-${String(m + 1).padStart(2, '0')}`;
            const monthData = data.filter(d => d.date.startsWith(monthStr));
            const gasOnly = monthData.filter(d => d.type === 'gas');
            
            if (monthData.length > 0) {
                const spent = monthData.reduce((sum, d) => sum + d.cost, 0);
                const miles = monthData.length > 1 ? (monthData[monthData.length-1].odometer - monthData[0].odometer) : 0;
                
                const row = `<tr>
                    <td>${new Date(year, m).toLocaleString('default', { month: 'long' })}</td>
                    <td>$${spent.toFixed(2)}</td>
                    <td>${miles} mi</td>
                    <td>${calculateDaysBetween(gasOnly)}</td>
                </tr>`;
                tbody.innerHTML += row;
            }
        }
    }

    function showMaintenance() {
        switchView('view-maintenance');
        const data = getFullData().filter(d => d.type === 'oil');
        const tbody = document.getElementById('oil-body');
        tbody.innerHTML = data.map(d => `<tr><td>${d.date}</td><td>${d.odometer}</td><td>$${d.cost}</td></tr>`).join('');
    }

    function switchView(id) {
        ['view-yearly', 'view-monthly', 'view-maintenance'].forEach(v => {
            document.getElementById(v).classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }

    // Init
    showYearly();
</script>

</body>
</html>
